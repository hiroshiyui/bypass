# SPDX-License-Identifier: GPL-3.0-or-later
#
# Release packaging per
# [ADR-0021](../../doc/adr/0021-release-packaging.md): on every git
# tag matching `v*`, build the `bypass` binary for each supported
# target, tar it up with LICENSE + README, and attach the tarballs
# + a SHA256SUMS file to the auto-created GitHub Release.

name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install `cross` (Linux aarch64 only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.cross'
        run: cargo build -p bypass --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p bypass --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGING="bypass-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/bypass" "${STAGING}/"
          cp LICENSE README.md "${STAGING}/"
          tar -czf "${STAGING}.tar.gz" "${STAGING}"
          # Per-target sha256 so SHA256SUMS at the release root can
          # concatenate them. macOS ships `shasum`; Linux ships
          # `sha256sum`. Normalise.
          if command -v sha256sum >/dev/null; then
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          fi

      - name: Upload artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: bypass-${{ matrix.target }}
          path: |
            bypass-*.tar.gz
            bypass-*.tar.gz.sha256

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Each `*.tar.gz.sha256` contains one line: `<hash>  <name>`.
          # Concatenate so the release ships one SHA256SUMS file
          # users can `sha256sum -c` against.
          cat *.tar.gz.sha256 > SHA256SUMS
          rm *.tar.gz.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
