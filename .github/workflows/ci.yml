# SPDX-License-Identifier: GPL-3.0-or-later
#
# Continuous integration for `bypass`: build, lint and run the default
# test suite on Linux and macOS for every push to `main` and every PR.
#
# The `#[ignore]`-by-default integration tests (`sync_loopback`,
# `sync_daemon`) are *not* run here — they need real networking and,
# for the mDNS round-trip case, working IPv4 multicast routes that
# hosted runners do not reliably expose (see
# `crates/bypass-cli/tests/sync_daemon.rs`). Run them locally with
# `cargo test --test sync_loopback -- --ignored` etc.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Linux runners ship gpg; macOS does not.
      - name: Install GPG (macOS only)
        if: runner.os == 'macOS'
        run: brew install gnupg

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  supply-chain:
    name: cargo deny + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + bin
        uses: Swatinem/rust-cache@v2
        with:
          key: supply-chain

      # `cargo install` is cached by Swatinem/rust-cache via
      # ~/.cargo/bin, so subsequent runs are near-instant. First run
      # on a fresh cache key adds ~90 s.
      - name: Install cargo-deny + cargo-audit
        run: |
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit

      # Checks: licences, advisories, bans, sources — driven by
      # deny.toml at the repo root.
      - name: cargo deny check
        run: cargo deny check

      # cargo-audit's advisory DB sometimes ships fresh findings
      # ahead of cargo-deny's. Run it separately for the extra
      # signal. The three IDs below are the same set deny.toml
      # ignores (see doc/security-audit.md for rationale);
      # re-evaluate at each libp2p bump.
      - name: cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0118 \
            --ignore RUSTSEC-2026-0119 \
            --ignore RUSTSEC-2024-0436
