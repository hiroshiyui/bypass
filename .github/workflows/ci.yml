# SPDX-License-Identifier: GPL-3.0-or-later
#
# Continuous integration for `bypass`: build, lint and run the default
# test suite on Linux and macOS for every push to `main` and every PR.
#
# The `#[ignore]`-by-default integration tests (`sync_loopback`,
# `sync_daemon`) are *not* run here — they need real networking and,
# for the mDNS round-trip case, working IPv4 multicast routes that
# hosted runners do not reliably expose (see
# `crates/bypass-cli/tests/sync_daemon.rs`). Run them locally with
# `cargo test --test sync_loopback -- --ignored` etc.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # Detects which areas of the repo changed in this push / PR so the
  # heavier jobs below (Android Gradle build, especially) only run
  # when they actually need to. Keeps GH runner usage down on
  # docs-only / Rust-only iterations.
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'crates/bypass-ffi/**'
              - 'crates/bypass-core/**'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - '.github/workflows/ci.yml'

  test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Linux runners ship gpg; macOS does not.
      - name: Install GPG (macOS only)
        if: runner.os == 'macOS'
        run: brew install gnupg

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  supply-chain:
    name: cargo deny + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + bin
        uses: Swatinem/rust-cache@v2
        with:
          key: supply-chain

      # `cargo install` is cached by Swatinem/rust-cache via
      # ~/.cargo/bin, so subsequent runs are near-instant. First run
      # on a fresh cache key adds ~90 s.
      - name: Install cargo-deny + cargo-audit
        run: |
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit

      # Checks: licences, advisories, bans, sources — driven by
      # deny.toml at the repo root.
      - name: cargo deny check
        run: cargo deny check

      # cargo-audit's advisory DB sometimes ships fresh findings
      # ahead of cargo-deny's. Run it separately for the extra
      # signal. The three IDs below are the same set deny.toml
      # ignores (see doc/security-audit.md for rationale);
      # re-evaluate at each libp2p bump.
      - name: cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0118 \
            --ignore RUSTSEC-2026-0119 \
            --ignore RUSTSEC-2024-0436

  android-ffi:
    name: bypass-ffi cross-compile (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache cargo + cargo-ndk
        uses: Swatinem/rust-cache@v2
        with:
          key: android-ffi
          workspaces: . -> target

      # `cargo-ndk` is the canonical Rust ↔ Android NDK driver.
      # Cached in ~/.cargo/bin alongside the toolchain.
      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      # ubuntu-latest ships the NDK; we just need to point
      # cargo-ndk at it. `latest` resolves under
      # /usr/local/lib/android/sdk/ndk/ to the highest stable
      # version the runner has.
      - name: Locate the Android NDK
        run: |
          NDK_PARENT="$ANDROID_SDK_ROOT/ndk"
          if [ ! -d "$NDK_PARENT" ]; then
            NDK_PARENT="/usr/local/lib/android/sdk/ndk"
          fi
          NDK_HOME="$(ls -1 "$NDK_PARENT" | sort -V | tail -1)"
          echo "ANDROID_NDK_HOME=$NDK_PARENT/$NDK_HOME" >> "$GITHUB_ENV"
          echo "Using NDK at $NDK_PARENT/$NDK_HOME"

      - name: Cross-compile bypass-ffi (arm64 + armv7)
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            build --release -p bypass-ffi

      - name: Upload .so artefacts
        uses: actions/upload-artifact@v4
        with:
          name: bypass-ffi-android
          path: |
            target/aarch64-linux-android/release/libbypass.so
            target/armv7-linux-androideabi/release/libbypass.so
          if-no-files-found: error

  android-gradle-build:
    name: Android Gradle build (debug APK)
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest pre-installs the Android SDK but not always
      # the exact API level we target. setup-android@v3 wraps
      # sdkmanager to install platforms;android-35 + the matching
      # build-tools so AGP's compileSdk = 35 (libs.versions.toml)
      # resolves.
      - name: Set up Android SDK + API 35
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: android-gradle
          workspaces: . -> target

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      # Same NDK-resolution helper as the android-ffi job above.
      - name: Locate the Android NDK
        run: |
          NDK_PARENT="$ANDROID_SDK_ROOT/ndk"
          if [ ! -d "$NDK_PARENT" ]; then
            NDK_PARENT="/usr/local/lib/android/sdk/ndk"
          fi
          NDK_HOME="$(ls -1 "$NDK_PARENT" | sort -V | tail -1)"
          echo "ANDROID_NDK_HOME=$NDK_PARENT/$NDK_HOME" >> "$GITHUB_ENV"
          echo "Using NDK at $NDK_PARENT/$NDK_HOME"

      # Persist Gradle's dep cache + wrapper-distribution cache
      # between runs. ~/.gradle/caches survives across the
      # configuration-cache + dep-resolution layers; the wrapper
      # cache keeps gradle-8.10 from re-downloading.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Gradle assemble debug
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bypass-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  extension-typecheck:
    name: extension typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        run: npm ci

      # `tsc --noEmit` catches type errors that esbuild would
      # silently bundle through. Both pass on every push.
      - name: TypeScript type-check
        run: npm run typecheck

      - name: esbuild bundle (smoke)
        run: node build.mjs
